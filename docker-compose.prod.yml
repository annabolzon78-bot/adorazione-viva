version: '3.9'

services:
  postgres:
    image: postgres:16-alpine
    container_name: av_postgres_prod
    restart: always
    environment:
      POSTGRES_USER:     ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB:       ${POSTGRES_DB}
    volumes:
      - pgdata_prod:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: av_backend_prod
    restart: always
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      NODE_ENV:               production
      PORT:                   4000
      DATABASE_URL:           postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      PRISMA_SCHEMA:          ../database/prisma/schema.prisma
      JWT_SECRET:             ${JWT_SECRET}
      JWT_REFRESH_SECRET:     ${JWT_REFRESH_SECRET}
      JWT_EXPIRES_IN:         15m
      JWT_REFRESH_EXPIRES_IN: 7d
      CORS_ORIGIN:            ${CORS_ORIGIN}
      LOG_LEVEL:              warn
      BCRYPT_ROUNDS:          12
    expose:
      - "4000"
    volumes:
      - ./database:/database

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: av_frontend_prod
    restart: always
    expose:
      - "80"

  nginx:
    image: nginx:alpine
    container_name: av_nginx
    restart: always
    depends_on:
      - backend
      - frontend
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./scripts/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - certbot_www:/var/www/certbot
      - certbot_conf:/etc/letsencrypt
    command: sh -c "nginx -g 'daemon off;'"

  certbot:
    image: certbot/certbot
    volumes:
      - certbot_www:/var/www/certbot
      - certbot_conf:/etc/letsencrypt
    entrypoint: /bin/sh -c "trap exit TERM; while :; do certbot renew; sleep 12h & wait $!; done"

volumes:
  pgdata_prod:
  certbot_www:
  certbot_conf:
