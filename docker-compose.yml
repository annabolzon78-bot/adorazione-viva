version: '3.9'

services:
  # ── PostgreSQL ────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: av_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER:     ${POSTGRES_USER:-avuser}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-avpassword}
      POSTGRES_DB:       ${POSTGRES_DB:-adorazione_viva}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./database/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-avuser} -d ${POSTGRES_DB:-adorazione_viva}"]
      interval: 5s
      timeout: 5s
      retries: 10

  # ── Backend ───────────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile.dev
    container_name: av_backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      NODE_ENV:         development
      PORT:             4000
      DATABASE_URL:     postgresql://${POSTGRES_USER:-avuser}:${POSTGRES_PASSWORD:-avpassword}@postgres:5432/${POSTGRES_DB:-adorazione_viva}
      PRISMA_SCHEMA:    ../database/prisma/schema.prisma
      JWT_SECRET:       ${JWT_SECRET:-dev-secret-change-in-production-32chars}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET:-dev-refresh-secret-change-32chars}
      JWT_EXPIRES_IN:   15m
      JWT_REFRESH_EXPIRES_IN: 7d
      CORS_ORIGIN:      http://localhost:5173
      LOG_LEVEL:        info
      BCRYPT_ROUNDS:    12
    ports:
      - "4000:4000"
    volumes:
      - ./backend:/app
      - ./database:/database
      - /app/node_modules
    command: npx tsx watch src/index.ts

  # ── Frontend (dev) ────────────────────────────────────────────
  frontend:
    image: node:20-alpine
    container_name: av_frontend
    working_dir: /app
    restart: unless-stopped
    depends_on:
      - backend
    environment:
      VITE_API_URL: http://localhost:4000/api
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    command: sh -c "npm install && npm run dev -- --host"

volumes:
  pgdata:
